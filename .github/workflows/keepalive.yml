name: PDI Keep-Alive

on:
  schedule:
    # Runs once a day at 6:00 UTC. PDIs hibernate after ~3 days idle,
    # so daily gives a big safety margin.
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run keep-alive script
        env:
          PDI_URL: ${{ secrets.PDI_URL }}
          PDI_USER: ${{ secrets.PDI_USER }}
          PDI_PASS: ${{ secrets.PDI_PASS }}
        run: python keepalive.py

      - name: Upload proof screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keepalive-proof-${{ github.run_number }}
          path: proof/*.png
          retention-days: 3
