name: PDI Keep-Alive

on:
  schedule:
    # TESTING MODE: runs every 10 minutes so you can confirm the schedule
    # trigger actually works before trusting it long term. Switch back to
    # the daily cron below once you've seen a few runs fire on their own.
    - cron: "*/10 * * * *"
    # - cron: "0 6 * * *"   # <-- daily version, uncomment and remove the line above once confirmed
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run keep-alive script
        env:
          PDI_URL: ${{ secrets.PDI_URL }}
          PDI_USER: ${{ secrets.PDI_USER }}
          PDI_PASS: ${{ secrets.PDI_PASS }}
        run: python keepalive.py

      - name: Upload proof screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keepalive-proof-${{ github.run_number }}
          path: proof/*.png
          retention-days: 3
